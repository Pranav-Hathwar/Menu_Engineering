
services:
  db:
    image: postgres:16-alpine
    container_name: menumind_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: menumind_user
      POSTGRES_PASSWORD: menumind_pass
      POSTGRES_DB: menumind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
